<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Masterclass: El Código del Crédito — Mandy Academy</title>
  <meta name="robots" content="noindex, nofollow">

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="icon" type="image/png" sizes="192x192" href="favicon-192.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

  <!-- Reveal.js -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/4.5.0/reveal.min.css">

  <style>
    /* ── Variables de Marca ── */
    :root {
      --bg-deep: #050A13;
      --bg-darker: #02060D;
      --gold: #D8B873;
      --gold-bright: #F1D28A;
      --cyan: #8FD8E8;
      --text-light: #FAFAFA;
      --text-muted: #B6C2CB;
      --text-soft: #E8EDF1;
      --card: rgba(7, 16, 29, 0.85);
      --card-border: rgba(216, 184, 115, 0.15);
      --font-h: 'Plus Jakarta Sans', sans-serif;
      --font-b: 'Outfit', 'Plus Jakarta Sans', sans-serif;
      --ease: cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: var(--bg-deep);
      color: var(--text-light);
      font-family: var(--font-b);
      overflow: hidden;
      height: 100%;
    }

    /* ── Reveal Overrides ── */
    .reveal {
      font-family: var(--font-b) !important;
      background: var(--bg-deep) !important;
    }
    .reveal .slides { text-align: left; }
    .reveal .controls { color: var(--gold) !important; }
    .reveal .progress span { background: var(--gold) !important; }

    /* Cada slide = imagen de fondo a pantalla completa */
    .reveal .slides section {
      padding: 0 !important;
      width: 100% !important;
      height: 100% !important;
    }

    /* ── Slide con imagen de fondo (los normales) ── */
    .slide-bg-img {
      position: absolute;
      inset: 0;
      background-size: contain;
      background-position: center;
      background-repeat: no-repeat;
      z-index: 1;
    }

    /* ── Capa de interactividad (se superpone a la imagen) ── */
    .interactive-overlay {
      position: absolute;
      inset: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }
    .interactive-overlay > * { pointer-events: auto; }

    /* ══════════════════════════════════════════════
       WIDGET: Simulador FICO Score (Slide 6)
       ══════════════════════════════════════════════ */
    .fico-widget {
      position: absolute;
      bottom: 30px;
      right: 40px;
      width: 420px;
      background: var(--card);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      z-index: 20;
    }
    .fico-dial-wrap {
      display: flex; flex-direction: column; align-items: center; margin-bottom: 16px;
    }
    .fico-num {
      font-family: var(--font-h); font-size: 56px; font-weight: 800;
      line-height: 1; margin-top: -10px;
      text-shadow: 0 4px 20px rgba(255,255,255,0.08);
    }
    .fico-tag {
      font-family: var(--font-h); font-size: 14px; font-weight: 700;
      padding: 4px 14px; border-radius: 20px; margin-top: 6px;
      display: inline-block;
    }
    .fico-range-row { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
    .fico-range-row span { font-size: 13px; color: var(--text-muted); min-width: 30px; }
    .fico-range {
      -webkit-appearance: none; width: 100%; height: 6px; border-radius: 3px;
      background: #152233; outline: none; cursor: pointer;
    }
    .fico-range::-webkit-slider-thumb {
      -webkit-appearance: none; width: 22px; height: 22px; border-radius: 50%;
      background: var(--gold); border: 2px solid #fff;
      box-shadow: 0 0 8px rgba(216,184,115,0.5); cursor: pointer;
    }
    .fico-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .fico-act {
      background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px; color: var(--text-soft); padding: 8px 10px;
      font-size: 12px; cursor: pointer; transition: all 0.25s ease; text-align: left;
      font-family: var(--font-b);
    }
    .fico-act:hover { border-color: var(--gold); color: var(--gold-bright); background: rgba(216,184,115,0.08); }
    .fico-act.neg:hover { border-color: #ef4444; color: #fca5a5; background: rgba(239,68,68,0.08); }

    /* ══════════════════════════════════════════════
       WIDGET: Selector de Sueños (Slide 5)
       ══════════════════════════════════════════════ */
    .dreams-widget {
      position: absolute;
      bottom: 80px; left: 50%; transform: translateX(-50%);
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px;
      width: 88%; max-width: 1100px;
      z-index: 20;
    }
    .dream-btn {
      background: var(--card);
      backdrop-filter: blur(16px);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 20px 16px;
      text-align: center; cursor: pointer;
      transition: all 0.35s var(--ease);
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    .dream-btn:hover { transform: translateY(-6px); border-color: var(--gold); box-shadow: 0 16px 40px rgba(216,184,115,0.12); }
    .dream-btn.on { border-color: var(--cyan); box-shadow: 0 0 30px rgba(143,216,232,0.2); transform: scale(1.02); }
    .dream-btn svg { width: 40px; height: 40px; color: var(--gold); margin-bottom: 10px; transition: color 0.3s; }
    .dream-btn.on svg { color: var(--cyan); }
    .dream-btn h4 { font-family: var(--font-h); font-size: 18px; font-weight: 700; margin-bottom: 6px; }
    .dream-btn.on h4 { color: var(--cyan); }
    .dream-btn p { font-size: 12px; color: var(--text-muted); line-height: 1.4; opacity: 0; max-height: 0; overflow: hidden; transition: all 0.4s var(--ease); }
    .dream-btn.on p { opacity: 1; max-height: 100px; margin-top: 8px; }

    /* ══════════════════════════════════════════════
       WIDGET: Antes/Después (Slide 27)
       ══════════════════════════════════════════════ */
    .ba-widget {
      position: absolute;
      inset: 0;
      z-index: 20;
      background: var(--bg-deep);
    }
    .ba-wrap {
      position: absolute;
      top: 14%; left: 50%; transform: translateX(-50%);
      width: 60%; max-width: 760px; aspect-ratio: 16/10;
      border-radius: 16px; overflow: hidden;
      border: 2px solid var(--card-border);
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .ba-wrap img {
      position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover;
    }
    .ba-after { clip-path: polygon(50% 0, 100% 0, 100% 100%, 50% 100%); z-index: 3; }
    .ba-before { z-index: 2; }
    .ba-stats {
      position: absolute;
      bottom: 8%; left: 50%; transform: translateX(-50%);
      display: flex !important; gap: 40px; align-items: center;
      z-index: 25;
      background: rgba(5,10,19,0.9);
      padding: 20px 40px;
      border-radius: 16px;
      border: 1px solid var(--card-border);
    }
    .ba-stat {
      text-align: center;
    }
    .ba-stat-val {
      font-family: var(--font-h); font-size: 42px; font-weight: 800;
      line-height: 1.1;
    }
    .ba-stat-val.red { color: #ef4444 !important; }
    .ba-stat-val.green { color: #10b981 !important; }
    .ba-stat-label {
      font-size: 13px; color: #B6C2CB !important; margin-top: 2px;
    }
    .ba-stat-arrow {
      font-size: 32px; color: var(--gold) !important; align-self: center;
    }
    .ba-line {
      position: absolute; top: 0; bottom: 0; left: 50%; width: 3px;
      background: var(--gold); z-index: 5;
      box-shadow: 0 0 12px rgba(216,184,115,0.6);
      pointer-events: none; transition: left 0.05s linear;
    }
    .ba-handle {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 44px; height: 44px; border-radius: 50%;
      background: var(--gold-bright); border: 3px solid var(--bg-deep);
      box-shadow: 0 0 16px rgba(216,184,115,0.5);
      z-index: 6; pointer-events: none;
      display: flex; align-items: center; justify-content: center;
      color: var(--bg-deep); font-weight: bold; font-size: 18px;
      transition: left 0.05s linear;
    }
    .ba-slider {
      position: absolute; inset: 0; width: 100%; height: 100%;
      -webkit-appearance: none; appearance: none;
      background: transparent; z-index: 10; cursor: ew-resize;
    }
    .ba-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 4px; height: 100%; background: transparent; cursor: ew-resize; }
    .ba-tag {
      position: absolute; bottom: 14px; padding: 6px 14px;
      background: rgba(2,6,13,0.8); backdrop-filter: blur(6px);
      border-radius: 20px; font-size: 13px; font-weight: 700; z-index: 7;
    }
    .ba-tag-b { left: 14px; border: 1px solid rgba(239,68,68,0.3); color: #ef4444; }
    .ba-tag-a { right: 14px; border: 1px solid rgba(16,185,129,0.3); color: #10b981; }
    .ba-title {
      position: absolute; top: 5%; left: 50%; transform: translateX(-50%);
      font-family: var(--font-h); font-size: 28px; font-weight: 800;
      color: var(--gold-bright); text-shadow: 0 4px 20px rgba(216,184,115,0.3);
      white-space: nowrap; z-index: 21;
    }

    /* ══════════════════════════════════════════════
       Panel de Notas del Presentador
       ══════════════════════════════════════════════ */
    .notes-btn {
      position: fixed; bottom: 16px; right: 16px; z-index: 1000;
      width: 46px; height: 46px; border-radius: 50%;
      background: var(--card); border: 1px solid var(--gold);
      color: var(--gold-bright); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .notes-btn:hover { transform: scale(1.1); box-shadow: 0 4px 20px rgba(216,184,115,0.3); }
    .notes-panel {
      position: fixed; top: 0; right: -380px; width: 360px; height: 100%;
      background: rgba(5,10,19,0.95); backdrop-filter: blur(20px);
      border-left: 1px solid var(--card-border);
      box-shadow: -8px 0 30px rgba(0,0,0,0.5);
      z-index: 999; padding: 24px; overflow-y: auto;
      transition: right 0.35s var(--ease);
    }
    .notes-panel.open { right: 0; }
    .notes-head {
      display: flex; justify-content: space-between; align-items: center;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      padding-bottom: 14px; margin-bottom: 18px;
    }
    .notes-head h3 { font-family: var(--font-h); font-size: 17px; color: var(--gold-bright); }
    .notes-close {
      background: none; border: none; color: var(--text-muted); font-size: 22px;
      cursor: pointer; transition: color 0.2s;
    }
    .notes-close:hover { color: #ef4444; }
    .notes-slide-title {
      font-family: var(--font-h); font-size: 14px; font-weight: 700;
      color: var(--cyan); margin-bottom: 14px;
      padding: 6px 10px; background: rgba(143,216,232,0.06);
      border-radius: 8px; border-left: 3px solid var(--cyan);
    }
    .note-block { margin-bottom: 18px; }
    .note-block h4 {
      font-size: 11px; font-weight: 800; color: var(--cyan); text-transform: uppercase;
      letter-spacing: 1.2px; margin-bottom: 6px;
    }
    .note-block p { font-size: 14px; line-height: 1.6; color: var(--text-soft); }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .fico-widget { width: 320px; right: 10px; bottom: 10px; padding: 16px; }
      .fico-num { font-size: 42px; }
      .dreams-widget { grid-template-columns: 1fr 1fr; gap: 8px; width: 94%; bottom: 40px; }
      .dream-btn { padding: 12px 10px; }
      .dream-btn svg { width: 28px; height: 28px; }
      .dream-btn h4 { font-size: 14px; }
      .ba-wrap { width: 90%; }
      .ba-title { font-size: 18px; top: 10px; }
      .notes-panel { width: 300px; right: -320px; }
    }
  </style>
</head>
<body>

  <div class="reveal">
    <div class="slides" id="slidesContainer">
      <!-- Se genera dinámicamente -->
    </div>
  </div>

  <!-- Notas del Presentador -->
  <button class="notes-btn" id="notesToggle" title="Guion de Amanda">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
  </button>
  <div class="notes-panel" id="notesPanel">
    <div class="notes-head">
      <h3>🎙️ Guion de Amanda</h3>
      <button class="notes-close" id="notesClose">&times;</button>
    </div>
    <div class="notes-slide-title" id="noteSlideTitle">Slide 1</div>
    <div id="notesBody"></div>
  </div>

  <!-- Scripts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/4.5.0/reveal.min.js"></script>
  <script src="js/slides-data.js"></script>
  <script>
  (function() {
    'use strict';

    const TOTAL_SLIDES = 46;
    const INTERACTIVE_SLIDES = [6, 7, 31]; // slides con widgets extra

    // ── Generar todas las secciones ──
    const container = document.getElementById('slidesContainer');

    for (let i = 1; i <= TOTAL_SLIDES; i++) {
      const section = document.createElement('section');
      const pad = String(i).padStart(2, '0');

      // Imagen de fondo del PPTX original
      section.innerHTML = `<div class="slide-bg-img" style="background-image:url('slides-img/slide-${pad}.png')"></div>`;

      // Widgets interactivos
      if (i === 6) section.innerHTML += buildDreamsWidget();
      if (i === 7) section.innerHTML += buildFicoWidget();
      if (i === 31) section.innerHTML += buildBAWidget();

      container.appendChild(section);
    }

    // ── Inicializar Reveal ──
    Reveal.initialize({
      width: 1920,
      height: 1080,
      margin: 0,
      minScale: 0.15,
      maxScale: 1.5,
      hash: true,
      controls: true,
      progress: true,
      center: false,
      transition: 'slide',
      backgroundTransition: 'none',
      touch: true,
      keyboard: true,
      overview: true
    }).then(() => {
      initNotes();
      initDreams();
      initFico();
      initBA();
    });

    // ════════════════════════════════
    //  WIDGET BUILDERS
    // ════════════════════════════════

    function buildDreamsWidget() {
      const dreams = [
        { icon: '<path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>', title: 'CASA', stat: 'El sueño #1 de la comunidad latina en EE.UU. Con un score +680 calificas a mejores tasas hipotecarias.' },
        { icon: '<rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/>', title: 'AUTO', stat: 'Ahorra +$8,000 en intereses. Score alto = tasa del 3-5% vs el 22% de concesionarios predatorios.' },
        { icon: '<line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>', title: 'PRÉSTAMO', stat: 'Accede a capital sin avales ni depósitos abusivos. Los bancos prestan bajo tu reputación crediticia.' },
        { icon: '<rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>', title: 'NEGOCIO', stat: 'Tarjetas corporativas al 0% de interés para tu LLC sin arriesgar tu capital personal.' }
      ];
      return `<div class="dreams-widget">${dreams.map(d => `
        <div class="dream-btn" data-dream="${d.title}">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${d.icon}</svg>
          <h4>${d.title}</h4>
          <p>${d.stat}</p>
        </div>`).join('')}
      </div>`;
    }

    function buildFicoWidget() {
      return `
      <div class="fico-widget">
        <div class="fico-dial-wrap">
          <svg width="200" height="120" viewBox="0 0 200 120">
            <path d="M20,110 A90,90 0 0,1 180,110" fill="none" stroke="#152233" stroke-width="14" stroke-linecap="round"/>
            <path id="ficoArc" d="M20,110 A90,90 0 0,1 180,110" fill="none" stroke="#f59e0b" stroke-width="14" stroke-linecap="round" stroke-dasharray="283" stroke-dashoffset="170" style="transition:all .5s var(--ease)"/>
          </svg>
          <div class="fico-num" id="ficoNum">580</div>
          <div class="fico-tag" id="ficoTag" style="background:rgba(245,158,11,.12);color:#fde68a;border:1px solid rgba(245,158,11,.4)">Regular</div>
        </div>
        <div class="fico-range-row">
          <span>300</span>
          <input type="range" class="fico-range" id="ficoRange" min="300" max="850" value="580">
          <span>850</span>
        </div>
        <div style="font-size:11px;color:var(--text-muted);margin-bottom:8px;font-weight:600;">SIMULAR ACCIONES:</div>
        <div class="fico-actions">
          <button class="fico-act" data-d="80">✅ Borrar colección (+80)</button>
          <button class="fico-act neg" data-d="-110">❌ Pago atrasado (-110)</button>
          <button class="fico-act" data-d="50">💳 Bajar utilización (+50)</button>
          <button class="fico-act neg" data-d="-15">🔍 Inquiry nueva (-15)</button>
        </div>
      </div>`;
    }

    function buildBAWidget() {
      return `
      <div class="ba-widget">
        <div class="ba-title">CASO REAL · ANTES Y DESPUÉS</div>
        <div class="ba-wrap">
          <img class="ba-before" src="outputs/assets/v5.4/caso-real-antes.jpeg" alt="Antes">
          <img class="ba-after" id="baAfter" src="outputs/assets/v5.4/caso-real-despues.jpeg" alt="Después">
          <div class="ba-line" id="baLine"></div>
          <div class="ba-handle" id="baHandle">↔</div>
          <input type="range" class="ba-slider" id="baSlider" min="0" max="100" value="50">
          <span class="ba-tag ba-tag-b">ANTES</span>
          <span class="ba-tag ba-tag-a">DESPUÉS</span>
        </div>
        <div class="ba-stats">
          <div class="ba-stat">
            <div class="ba-stat-val red">532</div>
            <div class="ba-stat-label">Score Antes · Grado F</div>
          </div>
          <div class="ba-stat-arrow">→</div>
          <div class="ba-stat">
            <div class="ba-stat-val green">655</div>
            <div class="ba-stat-label">Score Después · Grado D</div>
          </div>
          <div class="ba-stat-arrow" style="color:#10b981">+123</div>
        </div>
      </div>`;
    }

    // ════════════════════════════════
    //  INTERACTIVIDAD
    // ════════════════════════════════

    function initDreams() {
      document.querySelectorAll('.dream-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.dream-btn').forEach(b => b.classList.remove('on'));
          btn.classList.add('on');
        });
      });
    }

    function initFico() {
      const range = document.getElementById('ficoRange');
      const num = document.getElementById('ficoNum');
      const tag = document.getElementById('ficoTag');
      const arc = document.getElementById('ficoArc');
      if (!range) return;

      function update(v) {
        v = Math.max(300, Math.min(850, v));
        range.value = v;
        num.textContent = v;
        const pct = (v - 300) / 550;
        const off = 283 - 283 * pct;
        arc.style.strokeDashoffset = off;

        let color, label, bg;
        if (v < 580)       { color = '#ef4444'; label = 'Malo'; bg = 'rgba(239,68,68,.12)'; }
        else if (v < 670)  { color = '#f59e0b'; label = 'Regular'; bg = 'rgba(245,158,11,.12)'; }
        else if (v < 740)  { color = '#10b981'; label = 'Bueno'; bg = 'rgba(16,185,129,.12)'; }
        else               { color = '#059669'; label = 'Excelente'; bg = 'rgba(5,150,105,.12)'; }

        arc.style.stroke = color;
        tag.textContent = label;
        tag.style.background = bg;
        tag.style.color = color === '#ef4444' ? '#fca5a5' : color === '#f59e0b' ? '#fde68a' : '#6ee7b7';
        tag.style.border = `1px solid ${color}66`;
      }

      range.addEventListener('input', e => update(+e.target.value));

      document.querySelectorAll('.fico-act').forEach(btn => {
        btn.addEventListener('click', () => {
          const d = +btn.dataset.d;
          const from = +range.value;
          const to = Math.max(300, Math.min(850, from + d));
          animateTo(from, to);
        });
      });

      function animateTo(from, to) {
        const start = performance.now();
        const dur = 400;
        (function frame(t) {
          const p = Math.min((t - start) / dur, 1);
          update(Math.round(from + (to - from) * p));
          if (p < 1) requestAnimationFrame(frame);
        })(start);
      }

      update(580);
    }

    function initBA() {
      const slider = document.getElementById('baSlider');
      const after = document.getElementById('baAfter');
      const line = document.getElementById('baLine');
      const handle = document.getElementById('baHandle');
      if (!slider) return;

      function set(v) {
        // "después" se muestra a la derecha del slider (v% → 100%)
        after.style.clipPath = `polygon(${v}% 0, 100% 0, 100% 100%, ${v}% 100%)`;
        line.style.left = v + '%';
        handle.style.left = v + '%';
      }
      slider.addEventListener('input', e => set(e.target.value));
      set(50);
    }

    // ════════════════════════════════
    //  NOTAS DEL PRESENTADOR
    // ════════════════════════════════

    function initNotes() {
      const panel = document.getElementById('notesPanel');
      const toggle = document.getElementById('notesToggle');
      const close = document.getElementById('notesClose');

      toggle.addEventListener('click', () => panel.classList.toggle('open'));
      close.addEventListener('click', () => panel.classList.remove('open'));
      document.addEventListener('keydown', e => { if (e.key === 'Escape') panel.classList.remove('open'); });

      function showNotes(idx) {
        const data = SLIDES_DATA[idx];
        const titleEl = document.getElementById('noteSlideTitle');
        const bodyEl = document.getElementById('notesBody');
        if (!data) return;

        titleEl.textContent = `Slide ${data.slide} — ${data.title || ''}`;

        const notes = data.notes || '';
        if (!notes.trim()) {
          bodyEl.innerHTML = '<p style="color:var(--text-muted);font-style:italic;font-size:14px;">Sin notas para esta diapositiva.</p>';
          return;
        }

        const blocks = notes.split('\n\n');
        bodyEl.innerHTML = blocks.map(block => {
          const lines = block.split('\n');
          const title = lines[0] || '';
          const body = lines.slice(1).join('<br>');
          return `<div class="note-block"><h4>${title}</h4><p>${body || '—'}</p></div>`;
        }).join('');
      }

      Reveal.on('slidechanged', e => showNotes(e.indexh));
      showNotes(Reveal.getState().indexh || 0);
    }

  })();
  </script>
</body>
